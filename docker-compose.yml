services:
  clyvovet-db:
    image: oscarfonts/h2
    container_name: clyvovet-db
    ports:
      - "9090:9090"
      - "8181:8181"
    volumes:
      - clyvovet-h2-data:/opt/h2-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  clyvovet-api:
    build: .
    container_name: clyvovet-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=h2
    depends_on:
      clyvovet-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clyvovet-h2-data:
    name: clyvovet-h2-data